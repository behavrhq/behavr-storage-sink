# Optional Kafka + Kafka UI when behavr-api is not running.
# Merge with the main compose file:
#   docker compose -f compose.yaml -f compose.kafka-standalone.yaml up -d
#
# Uses the same Bitnami legacy image pattern as behavr-api. Stop this before starting
# behavr-api if both would claim host port 9092 (or 8081 for UI).
#
# See https://hub.docker.com/r/bitnamilegacy/kafka
services:
  kafka:
    image: docker.io/bitnamilegacy/kafka:3.7.1-debian-12-r9
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,INTERNAL://kafka:29092"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - storagesink_kafka_data:/bitnami/kafka

  kafka-ui:
    image: docker.io/provectuslabs/kafka-ui:latest
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: behavr-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka

volumes:
  storagesink_kafka_data:
